[[local|localrc]]

HOST_IP=192.168.1.65

ADMIN_PASSWORD=secret
DATABASE_PASSWORD=$ADMIN_PASSWORD
RABBIT_PASSWORD=$ADMIN_PASSWORD
SERVICE_PASSWORD=$ADMIN_PASSWORD
SWIFT_HASH=orcadevstackswifthash

LOGFILE=$DEST/logs/stack.sh.log
LOGDAYS=2
LOG_COLOR=False

disable_service tempest
disable_service horizon

enable_service c-bak
enable_service s-proxy s-account s-container s-object

enable_plugin heat https://opendev.org/openstack/heat stable/2025.2
enable_service h-eng h-api h-api-cfn h-api-cw

enable_plugin barbican https://opendev.org/openstack/barbican stable/2025.2

enable_plugin designate https://opendev.org/openstack/designate stable/2025.2
DESIGNATE_BACKEND_DRIVER=bind9

# Octavia disabled: stable/2025.2 ovn-octavia-provider does not expose
# octavia_create_network_interface_device, plugin.sh:487 die. Re-enable
# once upstream fixes the OVN integration (see lp:#xxxxxx upstream tracker).
# enable_plugin octavia https://opendev.org/openstack/octavia stable/2025.2
# enable_plugin ovn-octavia-provider https://opendev.org/openstack/ovn-octavia-provider stable/2025.2
# enable_service octavia o-api o-cw o-hm o-hk o-da

IMAGE_URL_SITE="https://download.cirros-cloud.net"
IMAGE_URL_PATH="/0.6.2/"
IMAGE_URL_FILE="cirros-0.6.2-x86_64-disk.img"
DOWNLOAD_DEFAULT_IMAGES=True
