site_name: orca
site_description: OpenStack Rich Command-line Alternative
site_url: https://stackopshq.github.io/orca-cli/
repo_url: https://github.com/stackopshq/orca-cli
repo_name: stackopshq/orca-cli

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: custom   # overridden to #09172B in assets/theme.css
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom   # overridden to #09172B in assets/theme.css
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - mkdocs-click

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: reference.md
  - Commands:
      - Overview: commands/index.md
      - Orca-exclusive:
          - overview: commands/overview.md
          - watch: commands/watch.md
          - doctor: commands/doctor.md
          - audit: commands/audit.md
          - cleanup: commands/cleanup.md
          - export: commands/export.md
          - find: commands/find.md
          - profile: commands/profile.md
          - setup: commands/setup.md
      - Compute:
          - server: commands/server.md
          - flavor: commands/flavor.md
          - keypair: commands/keypair.md
          - aggregate: commands/aggregate.md
          - availability-zone: commands/availability-zone.md
          - compute-service: commands/compute-service.md
          - hypervisor: commands/hypervisor.md
          - server-group: commands/server-group.md
          - event: commands/event.md
          - usage: commands/usage.md
      - Image:
          - image: commands/image.md
      - Block Storage:
          - volume: commands/volume.md
          - backup (Freezer): commands/backup.md
      - Object Storage:
          - container: commands/container.md
          - object: commands/object.md
      - Network:
          - network: commands/network.md
          - floating-ip: commands/floating-ip.md
          - security-group: commands/security-group.md
          - qos: commands/qos.md
          - subnet-pool: commands/subnet-pool.md
          - trunk: commands/trunk.md
      - Load Balancer:
          - loadbalancer: commands/loadbalancer.md
      - DNS:
          - zone: commands/zone.md
          - recordset: commands/recordset.md
      - Orchestration:
          - stack (Heat): commands/stack.md
      - Clusters:
          - cluster (Magnum): commands/cluster.md
      - Metrics & Alarms:
          - metric (Gnocchi): commands/metric.md
          - alarm (Aodh): commands/alarm.md
      - Rating:
          - rating (CloudKitty): commands/rating.md
      - Placement:
          - placement: commands/placement.md
      - Secrets:
          - secret (Barbican): commands/secret.md
      - Identity:
          - user: commands/user.md
          - project: commands/project.md
          - domain: commands/domain.md
          - role: commands/role.md
          - group: commands/group.md
          - policy: commands/policy.md
          - credential: commands/credential.md
          - application-credential: commands/application-credential.md
          - access-rule: commands/access-rule.md
          - trust: commands/trust.md
          - token: commands/token.md
          - auth: commands/auth.md
          - endpoint: commands/endpoint.md
          - endpoint-group: commands/endpoint-group.md
          - region: commands/region.md
          - service: commands/service.md
          - limit: commands/limit.md
          - registered-limit: commands/registered-limit.md
      - Federation:
          - identity-provider: commands/identity-provider.md
          - federation-protocol: commands/federation-protocol.md
          - mapping: commands/mapping.md
          - service-provider: commands/service-provider.md
      - Utilities:
          - ip: commands/ip.md
          - limits: commands/limits.md
          - quota: commands/quota.md
          - catalog: commands/catalog.md
          - completion: commands/completion.md
  - Architecture Decisions:
      - Index: adr/README.md
      - 0001 — Lazy command registration: adr/0001-lazy-command-registration.md
      - 0002 — Dual-format config file: adr/0002-dual-format-config-file.md
      - 0003 — Auth-type auto-detection: adr/0003-auth-type-auto-detection.md
      - 0004 — No services layer (superseded by 0007): adr/0004-no-services-layer.md
      - 0005 — Durable token cache: adr/0005-durable-token-cache.md
      - 0006 — Idempotent-only retries: adr/0006-idempotent-only-retries.md
      - 0007 — Incremental services layer: adr/0007-incremental-services-layer.md
      - 0008 — Command naming convention: adr/0008-command-naming-convention.md
      - 0009 — Server boot mode policy: adr/0009-server-boot-mode-policy.md
      - 0010 — Static completion script: adr/0010-static-completion-script.md

extra_css:
  - assets/theme.css
