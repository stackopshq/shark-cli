[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "shark-cli"
version = "0.1.0"
description = "A professional CLI for the Sharktech Cloud Provider API"
authors = ["Sharktech Community"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://stackopshq.github.io/shark-cli/"
repository = "https://github.com/stackopshq/shark-cli"
documentation = "https://stackopshq.github.io/shark-cli/"
packages = [{ include = "shark_cli" }]
keywords = ["sharktech", "cloud", "cli", "openstack", "api"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Systems Administration",
    "Topic :: Utilities",
]

[tool.poetry.dependencies]
python = ">=3.9,<4.0"
click = "^8.1"
httpx = "^0.27"
pyyaml = "^6.0"
rich = "^13.0"

[tool.poetry.scripts]
shark = "shark_cli.main:cli"

[tool.poetry.urls]
"Bug Tracker" = "https://github.com/stackopshq/shark-cli/issues"
